package: d2u_references
version: '1.2.0'
author: Tobias Krais
supportpage: http://github.com/tobiaskrais/d2u_references

page:
    title: 'translate:d2u_references'
    perm: 'd2u_references[]'
    icon: rex-icon fa-thumbs-o-up
    subpages:
        reference: { title: 'translate:d2u_references_references', icon: rex-icon fa-thumbs-o-up }
        tag: { title: 'translate:d2u_references_tags', icon: rex-icon fa-tags }
        settings:
            icon: rex-icon rex-icon-system
            title: ''
            itemClass: pull-right
            subpages:
                settings: { title: 'translate:d2u_helper_settings', icon: rex-icon rex-icon-system, perm: 'd2u_references[settings]' }
                setup: { title: 'translate:d2u_helper_setup', icon: rex-icon rex-icon-install, perm: 'd2u_references[settings]' }
        help:
            title: ''
            icon: rex-icon rex-icon-help
            itemClass: pull-right
            subpages:
                changelog: { title: 'translate:d2u_helper_help_chapter_changelog' }

requires:
    redaxo: '>=5.10.0'
    packages:
        d2u_helper: '>=2.2.1'
        sprog: '>=1.0.0'
        url: '>=2.0'
        yrewrite: '>=2.0.1'
    php: '>=8.0'

conflicts:
    packages:
        d2u_videos: '<1.2'

installer_ignore:
    - .github